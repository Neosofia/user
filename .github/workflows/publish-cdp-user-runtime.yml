# Build and push ghcr.io/neosofia/cdp-user from the CDP repo Dockerfile.
#
# Runs in the User repo so Actions can read this repository and build the user base
# image without cross-package GHCR pulls. CDP's cdp-user-build-push workflow still
# publishes from Neosofia/cdp when the `user` package grants Actions access to `cdp`.
#
# Manual:
#   gh workflow run publish-cdp-user-runtime.yml -f cdp_ref=cdp-user/v0.1.1 -f cdp_user_version=v0.1.1

name: publish-cdp-user-runtime

on:
  workflow_dispatch:
    inputs:
      cdp_ref:
        description: CDP git ref (branch or cdp-user/v* tag)
        required: true
        default: cdp-user/v0.1.1
      cdp_user_version:
        description: cdp-user image version tag (vMAJOR.MINOR.PATCH)
        required: true
        default: v0.1.1

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push cdp-user
    runs-on: ubuntu-latest

    steps:
      - name: Checkout User service
        uses: actions/checkout@v6

      - name: Checkout CDP
        uses: actions/checkout@v6
        with:
          repository: Neosofia/cdp
          ref: ${{ inputs.cdp_ref }}
          path: cdp

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build user base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cdp-user:user-base-${{ inputs.cdp_user_version }}

      - name: Build and push cdp-user image
        uses: docker/build-push-action@v7
        with:
          context: cdp
          file: cdp/deploy/user/Dockerfile
          build-args: |
            USER_IMAGE=ghcr.io/${{ github.repository_owner }}/cdp-user:user-base-${{ inputs.cdp_user_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cdp-user:${{ inputs.cdp_user_version }}
            ghcr.io/${{ github.repository_owner }}/cdp-user:latest
