# Alembic Configuration File
# See the documentation for more options at %%doc

[alembic]
# path to migration scripts
script_location = src/db/migrations

# SQLAlchemy database URL for migrations (superuser). Required — see MIGRATION_DATABASE_URL.
sqlalchemy.url = %(MIGRATION_DATABASE_URL)s

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with dates
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to the `datetime.datetime.fromtimestamp()` function and therefore must
# be a valid value that `%%(asctime)s` can accept. Defaults to the value set
# by the `sqlalchemy.url` instance of the config.
# sqlalchemy.timezone =

# max length of characters to apply to the
# "slug" field of the revision file
# when using file_template. The default value is 40
# splice_name_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_process_flag = true

# Logging configuration
# Loggers to configure, logging_name is the logger name to configure
# Additional logging information supplied to the message when
# the logger level is WARN or higher: "%(sqlalchemy.url)s"

[loggers]
keys = sqlalchemy.engine,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %H:%M:%S
